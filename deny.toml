# cargo-deny configuration for windows-mtr
# https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  # transitive via trippy-tui/maxminddb; no compatible update available while pinned to trippy 0.13.x
  "RUSTSEC-2025-0132",
  # transitive via ratatui/trippy; crate archived with no direct safe upgrade path for this stack yet
  "RUSTSEC-2024-0436",
  # transitive via trippy-dns/hickory-resolver; hickory-proto 0.26.x is incompatible with trippy 0.13.x constraints
  "RUSTSEC-2026-0119",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "Unlicense",
]
private = { ignore = false }

[bans]
# Current upstream graph contains unavoidable duplicates across trippy/ratatui ecosystem versions.
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
