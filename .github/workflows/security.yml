name: Security

on:
  # Path filters keep security checks focused on files that impact dependency risk,
  # audit policy, or executable code paths; PR and push triggers intentionally match.
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
      - '.cargo/audit.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'src/**'
      - 'xtask/**'
      - 'fuzz/**'
      - '.github/workflows/security.yml'
  push:
    branches: [ master ]
    paths:
      - '.cargo/audit.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'src/**'
      - 'xtask/**'
      - 'fuzz/**'
      - '.github/workflows/security.yml'

permissions:
  contents: read

jobs:
  cargo-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust 1.88.0
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.88.0

      - name: Cache Cargo dependencies and installed binaries
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-security-1.88.0"
          cache-bin: true
          cache-on-failure: true

      - name: Run cargo-deny
        id: cargo_deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2
        with:
          rust-version: 1.88.0
          command: check
          arguments: --all-features
          manifest-path: ./Cargo.toml
          log-level: warn

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        id: cargo_audit
        run: cargo audit

      - name: Security summary
        if: always()
        run: |
          {
            echo "## Security workflow summary"
            echo ""
            echo "- cargo-deny: ${{ steps.cargo_deny.outcome }}"
            echo "- cargo-audit: ${{ steps.cargo_audit.outcome }}"
            echo ""
            echo "### Notes"
            echo "- cargo-deny config: \`deny.toml\`"
            echo "- Rust toolchain pinned to 1.88.0 for security checks"
          } >> "$GITHUB_STEP_SUMMARY"


  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Cache Cargo dependencies and installed binaries
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-fuzz-smoke-nightly"
          cache-bin: true
          cache-on-failure: true

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz smoke target (passthrough_flags)
        id: fuzz_passthrough_flags
        working-directory: fuzz
        run: cargo fuzz run passthrough_flags -- -max_total_time=30

      - name: Fuzz summary
        if: always()
        run: |
          {
            echo "## Fuzz smoke workflow summary"
            echo ""
            echo "- passthrough_flags: ${{ steps.fuzz_passthrough_flags.outcome }}"
            echo ""
            echo "### Notes"
            echo "- libFuzzer target: \`fuzz/fuzz_targets/passthrough_flags.rs\`"
            echo "- Runtime budget: 30s"
          } >> "$GITHUB_STEP_SUMMARY"
