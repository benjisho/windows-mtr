name: Security

on:
  # Path filters keep security checks focused on files that impact dependency risk,
  # audit policy, or executable code paths; PR and push triggers intentionally match.
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
      - '.cargo/audit.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'src/**'
      - 'xtask/**'
      - 'fuzz/**'
      - '.github/workflows/security.yml'
  push:
    branches: [ master ]
    paths:
      - '.cargo/audit.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'src/**'
      - 'xtask/**'
      - 'fuzz/**'
      - '.github/workflows/security.yml'

permissions:
  contents: read

jobs:
  cargo-security:
    name: Cargo deny and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust 1.88.0
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.88.0

      - name: Cache Cargo dependencies and installed binaries
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-security-1.88.0"
          cache-bin: true
          cache-on-failure: true

      - name: Run cargo-deny
        id: cargo_deny
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2
        with:
          rust-version: 1.88.0
          command: check
          arguments: --all-features
          manifest-path: ./Cargo.toml
          log-level: warn

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        id: cargo_audit
        run: cargo audit


      - name: Security summary
        if: always()
        run: |
          {
            echo "## Security workflow summary"
            echo ""
            echo "- cargo-deny: ${{ steps.cargo_deny.outcome }}"
            echo "- cargo-audit: ${{ steps.cargo_audit.outcome }}"
            echo ""
            echo "### Notes"
            echo "- cargo-deny config: \`deny.toml\`"
            echo "- Rust toolchain pinned to 1.88.0 for security checks"
            echo "- Extended fuzz regression runs on the weekly schedule"
          } >> "$GITHUB_STEP_SUMMARY"
