name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Validate source
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all
        shell: pwsh

      - name: Build release binary
        run: cargo build --release --bin mtr --target x86_64-pc-windows-msvc
        shell: pwsh

      - name: Package canonical ZIP
        run: |
          New-Item -ItemType Directory -Path dist,stage -Force | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/mtr.exe stage/mtr.exe
          Copy-Item target/x86_64-pc-windows-msvc/release/mtr.exe stage/windows-mtr.exe
          @"
Windows MTR portable package

Commands:
.\mtr.exe 8.8.8.8
.\windows-mtr.exe -r -c 10 8.8.8.8
"@ | Set-Content stage/README.txt

          Compress-Archive -Path stage/* -DestinationPath dist/windows-mtr-x86_64.zip -Force
          $zipHash = (Get-FileHash -Algorithm SHA256 dist/windows-mtr-x86_64.zip).Hash
          "$zipHash  windows-mtr-x86_64.zip" | Set-Content dist/SHA256SUM

          Copy-Item dist/SHA256SUM stage/SHA256SUM
          Compress-Archive -Path stage/* -DestinationPath dist/windows-mtr-x86_64.zip -Force

          $zipHash = (Get-FileHash -Algorithm SHA256 dist/windows-mtr-x86_64.zip).Hash
          $mtrHash = (Get-FileHash -Algorithm SHA256 stage/mtr.exe).Hash
          $wmtrHash = (Get-FileHash -Algorithm SHA256 stage/windows-mtr.exe).Hash
          @(
            "$zipHash  windows-mtr-x86_64.zip",
            "$mtrHash  mtr.exe",
            "$wmtrHash  windows-mtr.exe"
          ) | Set-Content dist/SHA256SUM
        shell: pwsh

      - name: Verify release artifacts
        run: |
          ./scripts/release/verify-release-artifacts.ps1 -ZipPath dist/windows-mtr-x86_64.zip -ChecksumPath dist/SHA256SUM
          Expand-Archive dist/windows-mtr-x86_64.zip -DestinationPath dist/extracted -Force
          ./dist/extracted/mtr.exe --help
          ./dist/extracted/windows-mtr.exe --version
          ./dist/extracted/mtr.exe -n -r -c 1 127.0.0.1
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-mtr-release
          path: |
            dist/windows-mtr-x86_64.zip
            dist/SHA256SUM

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            dist/windows-mtr-x86_64.zip
            dist/SHA256SUM
          name: Windows MTR ${{ github.ref_name }}
          body: |
            Canonical artifact: `windows-mtr-x86_64.zip`

            Extract and run:
            - `.\mtr.exe 8.8.8.8`
            - `.\windows-mtr.exe -r -c 10 8.8.8.8`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
