name: CI

on:
  workflow_dispatch:
    inputs:
      run_windows_elevated_self_hosted:
        description: "Run privileged Windows probe smoke on an elevated self-hosted runner"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 5 * * 1'
  push:
    branches: [ master ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'xtask/**'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - 'docs/probe-parity.md'
      - 'docs/api/openapi.yaml'
      - 'scripts/check_openapi_compat.sh'
      - 'scripts/validate_openapi_schema.py'
  pull_request:
    branches: [ master ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'xtask/**'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - 'docs/probe-parity.md'
      - 'docs/api/openapi.yaml'
      - 'scripts/check_openapi_compat.sh'
      - 'scripts/validate_openapi_schema.py'
permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Set up Rust 1.88.0 (for pre-commit Rust hooks)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Install hadolint
        shell: bash
        run: |
          HADOLINT_VERSION=v2.12.0
          curl -sSfL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-linux-x86_64" -o hadolint
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint
          hadolint --version

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  resolve-msrv:
    needs: pre-commit
    name: Resolve MSRV from Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.resolve.outputs.msrv }}
      stable_version: ${{ steps.resolve.outputs.stable_version }}
      run_stable: ${{ steps.resolve.outputs.run_stable }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve rust-version from Cargo.toml and stable toolchain version
        id: resolve
        shell: bash
        run: |
          msrv=$(python3 - <<'PY2'
          import re
          from pathlib import Path
          text = Path('Cargo.toml').read_text(encoding='utf-8')
          m = re.search(r'^rust-version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"', text, re.M)
          if not m:
              raise SystemExit('Unable to resolve rust-version from Cargo.toml')
          print(m.group(1))
          PY2
          )

          rustup toolchain install stable --profile minimal
          stable_version=$(rustc +stable --version | sed -E 's/^rustc ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          if [ "$stable_version" = "$msrv" ]; then
            run_stable=false
          else
            run_stable=true
          fi

          {
            echo "msrv=$msrv"
            echo "stable_version=$stable_version"
            echo "run_stable=$run_stable"
          } >> "$GITHUB_OUTPUT"

          if [ "$run_stable" = "false" ]; then
            echo "Stable toolchain ($stable_version) matches MSRV ($msrv). Skipping CI / Test (..., stable) because CI / Test (..., msrv=$msrv) already validated this version." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Stable toolchain ($stable_version) differs from MSRV ($msrv). Running CI / Test (..., stable)." >> "$GITHUB_STEP_SUMMARY"
          fi

  test-msrv:
    name: Test (${{ matrix.os }}, msrv)
    runs-on: ${{ matrix.os }}
    needs: [pre-commit, resolve-msrv]
    if: github.event_name == 'push' || github.event_name == 'schedule'
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (MSRV)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ needs.resolve-msrv.outputs.msrv }}
          components: clippy
          targets: x86_64-pc-windows-msvc


      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-${{ matrix.os }}-msrv-${{ needs.resolve-msrv.outputs.msrv }}"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Check
        run: cargo check --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

      - name: Run tests
        run: cargo test --all
        env:
          CARGO_INCREMENTAL: 0

  test-stable:
    name: Test (${{ matrix.os }}, stable)
    runs-on: ${{ matrix.os }}
    needs: [pre-commit, resolve-msrv]
    if: needs.resolve-msrv.outputs.run_stable == 'true'
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: clippy
          targets: x86_64-pc-windows-msvc


      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-windows-latest-stable"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Check
        run: cargo check --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

      - name: Run tests
        run: cargo test --all
        env:
          CARGO_INCREMENTAL: 0

  probe-parity:
    name: Probe parity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [pre-commit]
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: false
          shared-key: "rust-${{ matrix.os }}-probe-parity"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Run probe parity tests
        shell: bash
        env:
          PARITY_SUMMARY_PATH: ${{ runner.temp }}/probe-parity-summary.md
          CARGO_INCREMENTAL: 0
        run: cargo test --test probe_parity_tests -- --nocapture

      - name: Publish parity summary
        if: always()
        shell: bash
        run: |
          if [ -f "${{ runner.temp }}/probe-parity-summary.md" ]; then
            cat "${{ runner.temp }}/probe-parity-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Probe parity summary file was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi


  api-contract-and-integration:
    name: API contract + integration
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install OpenAPI validation tooling
        shell: bash
        run: |
          python3 -m pip install --disable-pip-version-check --no-input openapi-spec-validator ruamel.yaml

      - name: Validate OpenAPI schema and duplicate YAML keys
        run: python3 scripts/validate_openapi_schema.py docs/api/openapi.yaml

      - name: Run API contract tests
        run: cargo test --test api_contract_tests -- --nocapture
        env:
          CARGO_INCREMENTAL: 0

      - name: Run API integration tests
        run: cargo test --test api_integration_tests -- --nocapture
        env:
          CARGO_INCREMENTAL: 0

      - name: Verify OpenAPI compatibility (breaking changes require version bump)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
          else
            base_ref="master"
          fi

          ./scripts/check_openapi_compat.sh "${base_ref}"


  security-audit:
    name: Security audit + fuzz smoke
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@598ce37759ea3902bf8efb433c7b6b0f81d44757 # cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings --deny unmaintained --deny unsound --deny yanked

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build fuzz targets
        run: cargo fuzz build --fuzz-dir fuzz

      - name: Run fuzz targets (smoke)
        shell: bash
        run: |
          set -euo pipefail
          for target in $(cargo fuzz list --fuzz-dir fuzz); do
            echo "Running fuzz target: ${target}"
            set +e
            timeout 30s cargo fuzz run --fuzz-dir fuzz "${target}" -- -max_total_time=20
            status=$?
            set -e
            if [ "$status" -eq 124 ]; then
              echo "Target ${target} reached CI timeout (expected for smoke run)."
              continue
            fi
            if [ "$status" -ne 0 ]; then
              echo "Fuzz target ${target} failed with status ${status}." >&2
              exit "$status"
            fi
          done


  docker-build-amd64:
    name: Test (docker, linux/amd64)
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: windows-mtr:ci-amd64
          cache-from: type=gha,scope=windows-mtr-docker-amd64
          cache-to: type=gha,mode=max,scope=windows-mtr-docker-amd64
          provenance: false
          sbom: false

      - name: Smoke test container entrypoint
        run: docker run --rm windows-mtr:ci-amd64 --help

  # New job to build binaries during pull requests for testing
  build-pr-binaries:
    name: Build PR Binaries
    runs-on: windows-latest
    needs: [pre-commit, test-msrv, test-stable, docker-build-amd64]
    if: github.event_name == 'pull_request' && needs.docker-build-amd64.result == 'success' && needs.test-msrv.result == 'success' && (needs.test-stable.result == 'success' || needs.test-stable.result == 'skipped')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc


      # Use advanced caching
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: false # Only save cache for master branch builds
          # Restore from the trusted Windows stable cache populated on master.
          # This avoids cold-start PR builds while keeping PR cache writes disabled.
          shared-key: "rust-windows-latest-stable"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Install cargo-binstall
        uses: taiki-e/install-action@6eb4471beed212309063862e6f5284ca3da3b01d # cargo-binstall

      - name: Install trippy (prebuilt binary)
        run: |
          echo "Installing trippy prebuilt binary..."
          cargo binstall trippy --no-confirm --locked

          $cargoBin = if ($env:CARGO_HOME) { Join-Path $env:CARGO_HOME "bin" } else { Join-Path $env:USERPROFILE ".cargo\bin" }
          $candidatePaths = @(
            (Join-Path $cargoBin "trip.exe"),
            (Join-Path $cargoBin "trippy.exe"),
            (Get-Command trip -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue),
            (Get-Command trippy -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue)
          )
          $trippyPath = $candidatePaths | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1

          if ($trippyPath -and (Test-Path -Path $trippyPath)) {
            echo "Trippy executable found at: $trippyPath"
            echo "TRIPPY_PATH=$trippyPath" >> $env:GITHUB_ENV
          } else {
            Write-Error "Could not find trippy executable after cargo binstall. Checked: $($candidatePaths -join ', ')"
            exit 1
          }
        shell: pwsh

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          CARGO_INCREMENTAL: 0

      - name: Create test build directory
        run: |
          mkdir -p pr-build
          cp target/x86_64-pc-windows-msvc/release/mtr.exe pr-build/mtr.exe
          cp target/x86_64-pc-windows-msvc/release/mtr.exe pr-build/windows-mtr.exe

          @"
          windows-mtr PR package
          ======================
          .\mtr.exe 8.8.8.8
          .\windows-mtr.exe -r -c 10 8.8.8.8
          "@ | Set-Content -Path "pr-build/README.txt"

          $mtrHash = (Get-FileHash -Path "pr-build/mtr.exe" -Algorithm SHA256).Hash
          $windowsMtrHash = (Get-FileHash -Path "pr-build/windows-mtr.exe" -Algorithm SHA256).Hash
          Set-Content -Path "pr-build/SHA256SUM" -Value @(
            "$mtrHash  mtr.exe",
            "$windowsMtrHash  windows-mtr.exe"
          )
        shell: pwsh

      - name: Create ZIP package
        run: |
          Compress-Archive -Path pr-build/* -DestinationPath pr-build/windows-mtr-x86_64.zip -Force
        shell: pwsh

      - name: Verify PR ZIP package layout
        run: ./scripts/release/verify-release-artifacts.ps1 -ZipPath "pr-build/windows-mtr-x86_64.zip"
        shell: pwsh

      - name: Dry-run release metadata update scripts
        run: |
          ./scripts/release/update-winget-manifest.ps1 -Version "1.1.3" -ZipPath "pr-build/windows-mtr-x86_64.zip"
          ./scripts/release/update-scoop-manifest.ps1 -Version "1.1.3" -ZipPath "pr-build/windows-mtr-x86_64.zip"
          ./scripts/release/update-chocolatey.ps1 -Version "1.1.3" -ZipPath "pr-build/windows-mtr-x86_64.zip"
        shell: pwsh

      - name: Upload PR build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-mtr-PR${{ github.event.pull_request.number }}
          path: |
            pr-build/*.exe
            pr-build/*.txt
            pr-build/SHA256SUM
            pr-build/*.zip
          retention-days: 14

      - name: Comment on PR with download link
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const artifactName = `windows-mtr-PR${context.issue.number}`;
            const workflowRunId = context.runId;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            const downloadUrl = `https://github.com/${repoOwner}/${repoName}/actions/runs/${workflowRunId}/artifacts`;
            const comment = `### 🚀 PR Build Ready for Testing\n\n` +
                           `Binary artifacts for this PR have been built and are available for testing.\n\n` +
                           `[Download Windows MTR PR Build](${downloadUrl})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
  test-ubuntu-smoke:
    name: Test (ubuntu-latest, smoke)
    runs-on: ubuntu-latest
    needs: pre-commit
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: false
          shared-key: "rust-ubuntu-latest-smoke"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Check (smoke)
        run: cargo check --all-targets
        env:
          CARGO_INCREMENTAL: 0

  test-ubuntu-stable-full:
    name: Test (ubuntu-latest, stable-full)
    runs-on: ubuntu-latest
    needs: [pre-commit, resolve-msrv, test-msrv]
    if: (github.event_name == 'push' || github.event_name == 'schedule') && needs.resolve-msrv.outputs.run_stable == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: clippy
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-ubuntu-latest-stable"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Check
        run: cargo check --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

      - name: Run tests
        run: cargo test --all
        env:
          CARGO_INCREMENTAL: 0

  privilege-probe-smoke:
    name: Privilege probe smoke (${{ matrix.os }}, non-elevated)
    runs-on: ${{ matrix.os }}
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            expected_exit_code: "1"
            expected_stderr_any_of: "privileges are required"
          - os: windows-latest
            expected_exit_code: "0"
            expected_stdout_contains: "Hop"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: false
          shared-key: "rust-${{ matrix.os }}-probe-smoke"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Run non-elevated privilege smoke harness
        run: cargo test --test privilege_probe_smoke -- --exact privilege_probe_smoke --nocapture
        env:
          CARGO_INCREMENTAL: 0
          EXPECT_EXIT_CODE: ${{ matrix.expected_exit_code }}
          EXPECT_STDOUT_CONTAINS: ${{ matrix.expected_stdout_contains }}
          EXPECT_STDERR_ANY_OF: ${{ matrix.expected_stderr_any_of }}
          SMOKE_ARGS: "-n -r -c 1 127.0.0.1"

  privilege-probe-smoke-linux-privileged:
    name: Privilege probe smoke (ubuntu-latest, elevated)
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: false
          shared-key: "rust-ubuntu-latest-probe-smoke-elevated"
          cache-bin: true
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Build smoke harness without running
        run: cargo test --test privilege_probe_smoke --no-run
        env:
          CARGO_INCREMENTAL: 0

      - name: Run elevated privilege smoke harness
        shell: bash
        run: |
          test_bin=$(find target/debug/deps -maxdepth 1 -type f -name 'privilege_probe_smoke-*' -executable | head -n 1)
          if [ -z "$test_bin" ]; then
            echo "Unable to locate compiled privilege smoke harness"
            exit 1
          fi

          sudo EXPECT_EXIT_CODE=0 EXPECT_STDOUT_CONTAINS=Hop SMOKE_ARGS="-n -r -c 1 127.0.0.1" "$test_bin" --exact privilege_probe_smoke --nocapture

  privilege-probe-smoke-windows-elevated-self-hosted:
    name: Privilege probe smoke (windows, elevated self-hosted)
    runs-on: [self-hosted, Windows, X64, elevated]
    needs: pre-commit
    if: github.event_name == 'workflow_dispatch' && inputs.run_windows_elevated_self_hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Run elevated privilege smoke harness
        shell: pwsh
        run: |
          $env:EXPECT_EXIT_CODE = "0"
          $env:EXPECT_STDOUT_CONTAINS = "Hop"
          $env:SMOKE_ARGS = "-n -r -c 1 127.0.0.1"
          cargo test --test privilege_probe_smoke -- --exact privilege_probe_smoke --nocapture

  privilege-probe-smoke-windows-elevated-note:
    name: Privilege probe smoke (windows, elevated lane note)
    runs-on: windows-latest
    needs: pre-commit
    if: github.event_name != 'workflow_dispatch' || !inputs.run_windows_elevated_self_hosted

    steps:
      - name: Document GitHub-hosted Windows elevation constraint
        shell: pwsh
        run: |
          "GitHub-hosted windows-latest runners cannot be interactively elevated; elevated probe smoke is provided via the optional self-hosted 'elevated' lane." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
