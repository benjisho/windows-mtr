name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  resolve-msrv:
    name: Resolve MSRV from Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.resolve.outputs.msrv }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve rust-version from Cargo.toml
        id: resolve
        shell: bash
        run: |
          msrv=$(python3 - <<'PY2'
          import re
          from pathlib import Path
          text = Path('Cargo.toml').read_text(encoding='utf-8')
          m = re.search(r'^rust-version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"', text, re.M)
          if not m:
              raise SystemExit('Unable to resolve rust-version from Cargo.toml')
          print(m.group(1))
          PY2
          )
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"

  test-msrv:
    name: Test (${{ matrix.os }}, msrv=${{ needs.resolve-msrv.outputs.msrv }})
    runs-on: ${{ matrix.os }}
    needs: resolve-msrv
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ needs.resolve-msrv.outputs.msrv }}
          components: clippy
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-${{ matrix.os }}-msrv-${{ needs.resolve-msrv.outputs.msrv }}"
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Check
        run: cargo check --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

      - name: Build
        run: cargo build --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run tests
        run: cargo test --all
        env:
          CARGO_INCREMENTAL: 0

  test-stable:
    name: Test (${{ matrix.os }}, stable)
    runs-on: ${{ matrix.os }}
    needs: test-msrv
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
          targets: x86_64-pc-windows-msvc

      - name: Detect whether stable equals MSRV
        id: stable_version_check
        shell: pwsh
        run: |
          $stable = (rustc --version)
          $msrv = "${{ needs.resolve-msrv.outputs.msrv }}"

          if ($stable -match "^rustc\s+$([regex]::Escape($msrv))(\s|$)") {
            "skip=true" >> $env:GITHUB_OUTPUT
            "stable_version=$stable" >> $env:GITHUB_OUTPUT
            echo "Stable toolchain matches MSRV ($msrv). Skipping duplicate stable test lane; already covered by CI / Test (..., msrv=$msrv)." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
            "stable_version=$stable" >> $env:GITHUB_OUTPUT
            echo "Stable toolchain differs from MSRV ($msrv): $stable" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Cache Rust dependencies
        if: steps.stable_version_check.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: "rust-${{ matrix.os }}-stable"
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Check
        if: steps.stable_version_check.outputs.skip != 'true'
        run: cargo check --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run clippy
        if: steps.stable_version_check.outputs.skip != 'true'
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

      - name: Build
        if: steps.stable_version_check.outputs.skip != 'true'
        run: cargo build --all-targets
        env:
          CARGO_INCREMENTAL: 0

      - name: Run tests
        if: steps.stable_version_check.outputs.skip != 'true'
        run: cargo test --all
        env:
          CARGO_INCREMENTAL: 0

  # New job to build binaries during pull requests for testing
  build-pr-binaries:
    name: Build PR Binaries
    runs-on: windows-latest
    needs: test-stable
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc

      # Use advanced caching
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false # Only save cache for master branch builds
          shared-key: "rust-windows-pr"
          cache-directories: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          cache-on-failure: true

      - name: Install trippy
        run: |
          echo "Installing trippy..."
          cargo install trippy
          
          # Verify installation and find location (trippy installs as trip.exe on Windows)
          $trippyPath = "$env:USERPROFILE\.cargo\bin\trip.exe"
          
          if (Test-Path $trippyPath) {
            echo "Trippy successfully installed as trip.exe at: $trippyPath"
            echo "TRIPPY_PATH=$trippyPath" >> $env:GITHUB_ENV
          } else {
            # Try to find it using where command as fallback
            try {
              $whereResult = where.exe trip
              if ($whereResult) {
                echo "Found trip.exe via where command at: $whereResult"
                echo "TRIPPY_PATH=$whereResult" >> $env:GITHUB_ENV
              } else {
                throw "trip.exe not found via where command"
              }
            } catch {
              Write-Error "Could not find trip.exe executable after installation. Please check PATH variables and cargo installation."
              exit 1
            }
          }
        shell: pwsh
        env:
          CARGO_INCREMENTAL: 0

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          CARGO_INCREMENTAL: 0

      - name: Create test build directory
        run: |
          mkdir -p pr-build
          cp target/x86_64-pc-windows-msvc/release/mtr.exe pr-build/windows-mtr.exe
          
          # Copy documentation files individually to avoid PowerShell parameter issues
          cp README.md pr-build/
          cp LICENSE pr-build/
          if (Test-Path USAGE.md) { cp USAGE.md pr-build/ }
          
          # Copy trippy executable
          cp "${{ env.TRIPPY_PATH }}" pr-build/trip.exe
        shell: pwsh

      - name: Create ZIP package
        run: |
          Compress-Archive -Path pr-build/* -DestinationPath pr-build/windows-mtr-PR${{ github.event.pull_request.number }}.zip -Force
        shell: pwsh
      
      - name: Upload PR build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-mtr-PR${{ github.event.pull_request.number }}
          path: |
            pr-build/*.exe
            pr-build/*.zip
          retention-days: 14
          
      - name: Comment on PR with download link
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const artifactName = `windows-mtr-PR${context.issue.number}`;
            const workflowRunId = context.runId;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;
            
            const downloadUrl = `https://github.com/${repoOwner}/${repoName}/actions/runs/${workflowRunId}/artifacts`;
            const comment = `### 🚀 PR Build Ready for Testing\n\n` +
                           `Binary artifacts for this PR have been built and are available for testing.\n\n` +
                           `[Download Windows MTR PR Build](${downloadUrl})`;
                           
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });