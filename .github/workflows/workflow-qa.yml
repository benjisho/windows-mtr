name: Pre-commit

on:
  pull_request:
    branches: [ master ]
    paths:
      - '.github/workflows/**'
      - '.pre-commit-config.yaml'
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/**'
      - '.pre-commit-config.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install hadolint
        shell: bash
        run: |
          HADOLINT_VERSION=v2.12.0
          curl -sSfL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-linux-x86_64" -o hadolint
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint
          hadolint --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit (workflow-focused)
        run: pre-commit run --files .github/workflows/*.yml .pre-commit-config.yaml
